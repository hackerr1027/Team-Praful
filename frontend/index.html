<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEREDIAN — Modular Fleet & Logistics Management</title>
    <meta name="description"
        content="Meridian is a modern logistics SaaS platform for fleet management, dispatching, safety compliance, and financial analytics." />
    <meta name="google-signin-client_id"
        content="263914103895-mcbbpm3o1qgjt1e9gr10ja2ltsq5jl1e.apps.googleusercontent.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Raleway:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* ── Reset & Base ────────────────────────────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #000;
            color: #fff;
        }

        /* ── Hero Container ──────────────────────────────── */
        #hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ── Video Layers ────────────────────────────────── */
        .video-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        #video-before {
            z-index: 0;
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        #video-before.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #video-after {
            z-index: 0;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #video-after.visible {
            opacity: 1;
        }

        /* ── Sign-In Overlay (Phase 1) ───────────────────  */
        #signin-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.7s ease;
        }

        #signin-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #signin-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ── Content Container (matches button size) ──────  */
        .signin-card {
            position: absolute;
            top: 50%;
            /* Shifted slightly left from previous: 54.17% → 53% */
            left: calc(52.5% + 0.5cm);
            transform: translate(-50%, -50%);
            width: min(380px, 28.5vw);
            height: min(380px, 28.5vw);
            text-align: center;
            padding: 28px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 28px;
        }

        .signin-card h1 {
            font-family: 'Lora', Georgia, serif;
            font-size: 36px;
            font-weight: 600;
            font-style: normal;
            color: #1c1c1c;
            margin: 0 0 10px 0;
            line-height: 1.15;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .signin-card p {
            font-family: 'Raleway', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.75);
            margin: 0 0 22px 0;
            line-height: 1.6;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
        }

        /* ── Google Sign-In Button ────────────────────────  */
        #google-signin-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 11px 22px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            user-select: none;
            box-shadow: 0 4px 14px rgba(26, 26, 46, 0.35);
        }

        #google-signin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 24px rgba(26, 26, 46, 0.45);
            background: linear-gradient(135deg, #233060 0%, #1a1a2e 100%);
        }

        #google-signin-btn:active {
            transform: translateY(0);
        }

        #google-signin-btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* ── Skip Intro Button ───────────────────────────── */
        #skip-btn {
            position: absolute;
            top: 24px;
            right: 28px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.25s ease, color 0.25s ease, opacity 0.3s ease;
            letter-spacing: 0.2px;
        }

        #skip-btn:hover {
            background: rgba(255, 255, 255, 0.22);
            color: #fff;
        }

        #skip-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ── Message Toast ───────────────────────────────── */
        #message {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(15, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateX(-50%) translateY(-8px);
            white-space: nowrap;
        }

        #message.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        #message.error {
            border-color: rgba(220, 53, 69, 0.5);
        }

        #message.success {
            border-color: rgba(40, 167, 69, 0.5);
        }

        /* ── Role Selection Overlay (Phase 2) ────────────  */
        #role-overlay {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        #role-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #role-overlay h2 {
            position: absolute;
            top: 14%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-family: 'Raleway', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: rgba(210, 220, 240, 0.92);
            margin: 0;
            text-align: center;
            text-shadow:
                0 0 40px rgba(100, 140, 220, 0.35),
                0 2px 12px rgba(0, 0, 0, 0.7);
        }

        /* ── Role Button Grid ─────────────────────────────  */
        .role-grid {
            display: grid;
            grid-template-columns: repeat(4, 4.5cm);
            gap: 3cm;
            position: absolute;
            left: calc(2.5cm + 10px);
            top: 50%;
            transform: translateY(-50%);
        }

        .role-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            font-family: 'Lora', Georgia, serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.88);
            background: linear-gradient(160deg, rgba(14, 22, 40, 0.2) 0%, rgba(9, 13, 26, 0.2) 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-left: 1px solid rgba(255, 255, 255, 0.07);
            border-right: 1px solid rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(0, 0, 0, 0.5);
            width: 4.5cm;
            height: 4.5cm;
            border-radius: 20px;
            cursor: pointer;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                inset 0 -2px 4px rgba(0, 0, 0, 0.4),
                0 6px 18px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
            line-height: 1.4;
            padding: 12px;
        }

        .role-btn:hover {
            background: linear-gradient(160deg, rgba(21, 32, 64, 0.2) 0%, rgba(13, 21, 48, 0.2) 100%);
            border-top-color: rgba(120, 160, 255, 0.2);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                inset 0 -2px 4px rgba(0, 0, 0, 0.4),
                0 8px 24px rgba(0, 0, 0, 0.6);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .role-btn:active {
            transform: translateY(1px);
            box-shadow:
                inset 0 2px 6px rgba(0, 0, 0, 0.5),
                0 2px 6px rgba(0, 0, 0, 0.4);
        }

        .role-btn:nth-child(2) {
            transform: translateX(20px);
        }

        .role-btn:nth-child(2):hover {
            transform: translateX(20px) translateY(-2px);
        }

        .role-btn:nth-child(2):active {
            transform: translateX(20px) translateY(1px);
        }

        .role-btn:nth-child(3) {
            transform: translateX(80px);
        }

        .role-btn:nth-child(3):hover {
            transform: translateX(80px) translateY(-2px);
        }

        .role-btn:nth-child(3):active {
            transform: translateX(80px) translateY(1px);
        }

        .role-btn:nth-child(4) {
            transform: translateX(100px);
        }

        .role-btn:nth-child(4):hover {
            transform: translateX(100px) translateY(-2px);
        }

        .role-btn:nth-child(4):active {
            transform: translateX(100px) translateY(1px);
        }

        /* ── Responsive ───────────────────────────────────  */
        @media (max-width: 520px) {
            .signin-card {
                width: min(280px, 80vw);
                height: min(280px, 80vw);
                padding: 20px;
            }

            .signin-card h1 {
                font-size: 16px;
            }

            .signin-card p {
                font-size: 11px;
                margin-bottom: 16px;
            }

            #google-signin-btn {
                font-size: 12px;
                padding: 9px 16px;
                gap: 8px;
            }

            #skip-btn {
                top: 16px;
                right: 16px;
                font-size: 12px;
                padding: 7px 14px;
            }

            .role-grid {
                max-width: 94vw;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            #role-overlay h2 {
                font-size: 13px;
            }

            .role-btn {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <section id="hero">
        <!-- Phase 1: Before Open Video -->
        <video id="video-before" class="video-layer" autoplay muted playsinline preload="auto"
            src="before%20open.mp4?v=2"></video>

        <!-- Phase 2: After Open Video (hidden initially) -->
        <video id="video-after" class="video-layer" muted playsinline preload="auto" src="after%20open.mp4?v=3"></video>

        <!-- Skip Intro -->
        <button id="skip-btn" aria-label="Skip intro video">Skip Intro</button>

        <!-- Sign-In Overlay (shown after Phase 1 video ends) -->
        <div id="signin-overlay">
            <div class="signin-card">
                <h1>Welcome to MERIDIAN</h1>
                <p>EVERY POINT. EVERY SECOND.</p>
                <button id="google-signin-btn" type="button" aria-label="Sign in with Google">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Sign in with Google
                </button>
            </div>
        </div>

        <!-- Role Selection Overlay (shown after Phase 2 video ends) -->
        <div id="role-overlay">
            <h2>Select Your Role</h2>
            <div class="role-grid">
                <a href="/fleet-manager" class="role-btn" id="btn-fleet-manager" data-role="fleet_manager">Fleet
                    Manager</a>
                <a href="/dispatcher" class="role-btn" id="btn-dispatcher" data-role="dispatcher">Dispatcher</a>
                <a href="/safety-officer" class="role-btn" id="btn-safety-officer" data-role="safety_officer">Safety
                    Officer</a>
                <a href="/financial-analyst" class="role-btn" id="btn-financial-analyst"
                    data-role="financial_analyst">Financial Analyst</a>
            </div>
        </div>

        <!-- Toast Message -->
        <div id="message"></div>
    </section>

    <script>
        (() => {
            /* ── Config ──────────────────────────────────── */
            const GOOGLE_CLIENT_ID = '263914103895-mcbbpm3o1qgjt1e9gr10ja2ltsq5jl1e.apps.googleusercontent.com';

            /* ── DOM Refs ────────────────────────────────── */
            const videoBefore = document.getElementById('video-before');
            const videoAfter = document.getElementById('video-after');
            const signinOverlay = document.getElementById('signin-overlay');
            const signinBtn = document.getElementById('google-signin-btn');
            const skipBtn = document.getElementById('skip-btn');
            const roleOverlay = document.getElementById('role-overlay');
            const messageEl = document.getElementById('message');

            /* ── State ───────────────────────────────────── */
            let phase1Done = false;

            /* ── Utilities ───────────────────────────────── */
            function showMessage(text, type = 'info') {
                messageEl.textContent = text;
                messageEl.className = `message ${type} show`;
                setTimeout(() => { messageEl.classList.remove('show'); }, 3000);
            }

            /* ── Phase 1: Show Sign-In ───────────────────  */
            function revealSignIn() {
                if (phase1Done) return;
                phase1Done = true;
                videoBefore.pause();
                signinOverlay.classList.add('visible');
                skipBtn.classList.add('hidden');
            }

            // When "before open" video reaches its final frame
            videoBefore.addEventListener('ended', revealSignIn);

            // Skip button
            skipBtn.addEventListener('click', revealSignIn);

            /* ── Phase 2: Transition to After Video ──────  */
            function transitionToPhase2() {
                // Hide sign-in overlay
                signinOverlay.classList.remove('visible');
                signinOverlay.classList.add('hidden');

                // Cross-fade videos
                setTimeout(() => {
                    videoBefore.classList.add('hidden');
                    videoAfter.classList.add('visible');
                    videoAfter.play().catch(() => { });
                }, 400);
            }

            /* ── Phase 3: Show Role Selection ────────────  */
            function revealRoles() {
                videoAfter.pause();
                roleOverlay.classList.add('visible');
            }

            // When "after open" video reaches its final frame
            videoAfter.addEventListener('ended', revealRoles);

            // Role buttons — save role to localStorage on click
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const role = btn.getAttribute('data-role');
                    if (role) {
                        localStorage.setItem('userRole', role);
                    }
                    // Navigation handled by the <a> href
                });
            });

            /* ── Google OAuth ────────────────────────────  */
            function handleGoogleCredential(response) {
                if (!response.credential) {
                    showMessage('Authentication failed. Please try again.', 'error');
                    return;
                }

                // Decode JWT token
                const payload = JSON.parse(atob(response.credential.split('.')[1]));

                // Store user data (same pattern as google_auth/script.js)
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', payload.email);
                localStorage.setItem('userName', payload.name);
                localStorage.setItem('userPicture', payload.picture);
                localStorage.setItem('authMethod', 'google');
                localStorage.setItem('googleCredential', response.credential);

                showMessage(`Welcome, ${payload.name}!`, 'success');

                // Proceed to Phase 2
                setTimeout(transitionToPhase2, 800);
            }

            function initGoogleAuth() {
                if (typeof google !== 'undefined' && google.accounts) {
                    google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: handleGoogleCredential,
                        auto_select: false,
                        cancel_on_tap_outside: true
                    });
                }
            }

            // Custom button click triggers Google prompt
            signinBtn.addEventListener('click', () => {
                if (typeof google !== 'undefined' && google.accounts) {
                    google.accounts.id.prompt((notification) => {
                        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                            // Fallback: use popup flow via OAuth2
                            const redirectUri = window.location.origin;
                            const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth'
                                + '?client_id=' + encodeURIComponent(GOOGLE_CLIENT_ID)
                                + '&redirect_uri=' + encodeURIComponent(redirectUri)
                                + '&response_type=token'
                                + '&scope=openid%20email%20profile'
                                + '&prompt=select_account';

                            // Open in popup
                            const popup = window.open(authUrl, 'google-auth', 'width=500,height=600,left=200,top=100');
                            if (!popup) {
                                showMessage('Please allow popups for Google Sign-In.', 'error');
                            }
                        }
                    });
                } else {
                    showMessage('Google Sign-In is loading. Please try again.', 'error');
                }
            });

            /* ── Init ─────────────────────────────────────  */
            // Wait for Google script to load
            const gsiCheck = setInterval(() => {
                if (typeof google !== 'undefined' && google.accounts) {
                    clearInterval(gsiCheck);
                    initGoogleAuth();
                }
            }, 200);

            // Safety timeout
            setTimeout(() => clearInterval(gsiCheck), 10000);
        })();
    </script>
</body>

</html>
